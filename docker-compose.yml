services:
  db:
    image: postgres:15-alpine
    container_name: license_plate_db_container
    restart: always
    environment:
      POSTGRES_DB: license_plate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d license_plate_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: license_plate_game_container
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
