version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: license_plate_db_container
    restart: always
    environment:
      POSTGRES_DB: license_plate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: license_plate_game_container
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - DB_HOST=db
    depends_on:
      - db

volumes:
  pgdata:
